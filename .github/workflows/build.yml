name: build

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    name: Build
    runs-on: "blacksmith-8vcpu-ubuntu-2404"

    env:
      NPM_GLOBAL_PREFIX: ~/.npm-global
      WRANGLER_VERSION: latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: "${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/*.versions.toml') }}"
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Wrangler (npm global)
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.npm-global
          key: "${{ runner.os }}-wrangler-${{ env.WRANGLER_VERSION }}"
          restore-keys: |
            ${{ runner.os }}-wrangler-

      - name: Install Wrangler
        run: |
          mkdir -p "$NPM_GLOBAL_PREFIX"
          npm config set prefix "$NPM_GLOBAL_PREFIX"
          echo "$NPM_GLOBAL_PREFIX/bin" >> $GITHUB_PATH
          if ! command -v wrangler >/dev/null 2>&1; then
            if [ "$WRANGLER_VERSION" = "latest" ]; then
              npm install -g wrangler@latest
            else
              npm install -g wrangler@$WRANGLER_VERSION
            fi
          fi
          wrangler --version

      - name: Build
        run: ./gradlew --no-daemon build -Pfull

      - name: Download latest grunt obfuscator
        run: |
          curl -L -o grunt-main.jar https://github.com/SpartanB312/Grunt/releases/latest/download/grunt-main.jar

      - name: Run grunt obfuscation
        run: java -jar grunt-main.jar cfg.json

      - name: Upload Loader to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler r2 object put v5-builds/V5-Loader.jar \
            --file V5-Loader.jar
