name: build

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    name: Build
    runs-on: "ubuntu-latest"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: "${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/*.versions.toml') }}"
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build
        run: ./gradlew --no-daemon build -Pfull

      - name: Download latest grunt obfuscator
        run: |
          curl -L -o grunt-main.jar https://github.com/SpartanB312/Grunt/releases/latest/download/grunt-main.jar

      - name: Run grunt obfuscation
        run: java -jar grunt-main.jar cfg.json

      - name: Get Short SHA
        id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Publish Loader Artifact
        uses: actions/upload-artifact@v4
        with:
          name: V5-Loader-${{ steps.sha.outputs.sha_short }}
          path: V5-Loader.jar
