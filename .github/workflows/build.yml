name: build

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    name: Build
    runs-on: "blacksmith-8vcpu-ubuntu-2404"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: "${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/*.versions.toml') }}"
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Verify Wrangler
        run: npx wrangler@latest --version

      - name: Build
        run: ./gradlew --no-daemon build -Pfull

      - name: Download latest grunt obfuscator
        run: |
          curl -L -o grunt-main.jar https://github.com/SpartanB312/Grunt/releases/latest/download/grunt-main.jar

      - name: Run grunt obfuscation
        run: java -jar grunt-main.jar cfg.json

      - name: Upload Loader to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@latest r2 object put v5-builds/V5-Loader.jar \
            --file V5-Loader.jar
