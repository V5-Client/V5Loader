name: build

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: "${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/*.versions.toml') }}"
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build
        run: ./gradlew --no-daemon build -Pfull

      - name: Download latest grunt obfuscator
        run: |
          curl -L -o grunt-main.jar https://github.com/SpartanB312/Grunt/releases/latest/download/grunt-main.jar

      - name: Run grunt obfuscation
        run: java -jar grunt-main.jar cfg.json

      - name: Get Short SHA
        id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache global npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-global-${{ runner.os }}
          restore-keys: |
            npm-global-${{ runner.os }}

      - name: Install latest Wrangler
        run: npm install -g wrangler@latest --prefer-offline

      - name: Upload Loader to Cloudflare R2
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler r2 object put v5-builds/V5-Loader.jar --file V5-Loader.jar --remote
