name: Build Windows Native Pathfinder JNI

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-builder:
    runs-on: blacksmith-2vcpu-windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Configure and build
        shell: pwsh
        run: |
          cmake -S NativeSrc -B NativeSrc/build -DCMAKE_BUILD_TYPE=Release
          cmake --build NativeSrc/build --config Release --parallel

      - name: Copy native library
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src/main/resources/assets/v5 | Out-Null
          if (Test-Path "NativeSrc/build/Release/V5PathJNI.dll") {
            Copy-Item NativeSrc/build/Release/V5PathJNI.dll src/main/resources/assets/v5/V5PathJNI.dll -Force
          } else {
            Copy-Item NativeSrc/build/V5PathJNI.dll src/main/resources/assets/v5/V5PathJNI.dll -Force
          }

      - name: Commit Windows JNI
        shell: bash
        run: |
          set -euo pipefail

          USER_NAME="$(git log -1 --pretty=%an "${{ github.sha }}")"
          USER_EMAIL="$(git log -1 --pretty=%ae "${{ github.sha }}")"
          git config user.name "$USER_NAME"
          git config user.email "$USER_EMAIL"

          git add src/main/resources/assets/v5/V5PathJNI.dll

          if ! git diff --cached --quiet; then
            git log -1 --pretty=%B "${{ github.sha }}" > .git/JNI_COMMIT_MSG
            echo "" >> .git/JNI_COMMIT_MSG
            echo "[skip-native-auto]" >> .git/JNI_COMMIT_MSG
            git commit -F .git/JNI_COMMIT_MSG
            rm -f .git/JNI_COMMIT_MSG
            BRANCH="${{ github.ref_name }}"
            git fetch origin "$BRANCH" --depth=50
            git rebase "origin/$BRANCH"
            git push origin HEAD:"$BRANCH"
          fi
