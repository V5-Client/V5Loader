name: Build Windows Native Pathfinder JNI

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-builder:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Configure and build
        shell: pwsh
        run: |
          $outputName = "V5PathJNI-windows-x86_64"
          cmake -S NativeSrc -B NativeSrc/build -A x64 -DCMAKE_BUILD_TYPE=Release "-DV5PATHJNI_OUTPUT_NAME=$outputName"
          cmake --build NativeSrc/build --config Release --parallel

      - name: Copy native library
        shell: pwsh
        run: |
          $outputName = "V5PathJNI-windows-x86_64"
          New-Item -ItemType Directory -Force -Path src/main/resources/assets/v5 | Out-Null
          $sourcePath = "NativeSrc/build/Release/$outputName.dll"
          if (-not (Test-Path $sourcePath)) {
            $sourcePath = "NativeSrc/build/$outputName.dll"
          }
          if (Test-Path $sourcePath) {
            Copy-Item $sourcePath "src/main/resources/assets/v5/$outputName.dll" -Force
            Copy-Item $sourcePath src/main/resources/assets/v5/V5PathJNI.dll -Force
          } else {
            throw "Windows native pathfinder library not found: $sourcePath"
          }

      - name: Commit Windows JNI
        shell: bash
        run: |
          set -euo pipefail

          USER_NAME="$(git log -1 --pretty=%an "${{ github.sha }}")"
          USER_EMAIL="$(git log -1 --pretty=%ae "${{ github.sha }}")"
          git config user.name "$USER_NAME"
          git config user.email "$USER_EMAIL"

          git add src/main/resources/assets/v5/V5PathJNI-windows-x86_64.dll src/main/resources/assets/v5/V5PathJNI.dll

          if ! git diff --cached --quiet; then
            git log -1 --pretty=%B "${{ github.sha }}" > .git/JNI_COMMIT_MSG
            echo "" >> .git/JNI_COMMIT_MSG
            echo "[skip-native-auto]" >> .git/JNI_COMMIT_MSG
            git commit -F .git/JNI_COMMIT_MSG
            rm -f .git/JNI_COMMIT_MSG
            BRANCH="${{ github.ref_name }}"
            git fetch origin "$BRANCH" --depth=50
            git rebase "origin/$BRANCH"
            git push origin HEAD:"$BRANCH"
          fi
